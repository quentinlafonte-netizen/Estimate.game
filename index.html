function brusselsNow(){const s=new Date().toLocaleString("en-CA",{timeZone:"Europe/Brussels",hour12:false});const[d]=s.split(", ");return d.split("-").map(Number)}
function daySeed(){const[y,m,d]=brusselsNow();return y*10000+m*100+d}
function seedRng(s){let v=s;return()=>{v=(v*16807)%2147483647;return v/2147483647}}
function shuf(a,r){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function dailyQs(){
  const r=seedRng(daySeed());
  const pr=BANK.filter(q=>q.tp==="price"),pc=BANK.filter(q=>q.tp==="pct"),ct=BANK.filter(q=>q.tp==="count");
  const wPr=[...pr,...pr.filter(q=>q.x)],wPc=[...pc,...pc.filter(q=>q.x)],wCt=[...ct,...ct.filter(q=>q.x)];
  const dd=(arr,n)=>{const s=new Set(),o=[];for(const q of arr){if(!s.has(q.q)){s.add(q.q);o.push(q)}if(o.length>=n)break}return o};
  return[...dd(shuf(wPr,r),2),...dd(shuf(wPc,r),2),...dd(shuf(wCt,r),1)].sort((a,b)=>a.t-b.t);
}
function dayNum(){const[y,m,d]=brusselsNow();const now=new Date(y,m-1,d);const start=new Date(2025,2,11);return Math.floor((now-start)/86400000)+1}
function calcScore(g,a,t,rng){
  const rangeErr=Math.abs(g-a)/((rng[1]-rng[0])||1)*100;
  const adj=rangeErr*(15/t);
  return adj<=2?5:adj<=5?4:adj<=10?3:adj<=20?2:adj<=35?1:0;
}
const TIERS=[
  {s:5,l:"Bullseye",e:"🎯",c:"green",bg:"greenBg"},
  {s:4,l:"Very close",e:"🟢",c:"green",bg:"greenBg"},
  {s:3,l:"Good feel",e:"🟡",c:"gold",bg:"goldBg"},
  {s:2,l:"Ballpark",e:"🟠",c:"orange",bg:"orangeBg"},
  {s:1,l:"Way off",e:"🔴",c:"red",bg:"redBg"},
  {s:0,l:"Lost in space",e:"⚫",c:"grey",bg:"greyBg"},
];
function tier(s){return TIERS.find(t=>t.s===s)||TIERS[5]}

function fmtN(n){if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=10000)return Math.round(n).toLocaleString("en");if(n>=100)return Math.round(n).toLocaleString("en");if(n>=10)return n.toFixed(1);return n>=1?n.toFixed(2):n.toFixed(2)}
function fmtV(n,tp,cur){if(tp==="pct")return n.toFixed(1)+"%";if(tp==="count")return fmtN(n);const s=cur==="EUR"?"€":"$";return s+fmtN(cur==="EUR"?n:n*EUR_USD)}
function fmtT(n,tp,cur){if(tp==="pct")return Math.round(n)+"%";if(tp==="count"){if(n>=1e9)return(n/1e9).toFixed(0)+"B";if(n>=1e6)return(n/1e6).toFixed(0)+"M";if(n>=1000)return(n/1000).toFixed(0)+"K";return String(Math.round(n))}const v=cur==="EUR"?n:n*EUR_USD;const s=cur==="EUR"?"€":"$";if(v>=1e9)return s+(v/1e9).toFixed(0)+"B";if(v>=1e6)return s+(v/1e6).toFixed(0)+"M";if(v>=1000)return s+(v/1000).toFixed(0)+"K";return v>=1?s+Math.round(v):s+v.toFixed(1)}

const _sk={c:0,b:0,d:0};function getSk(){return{..._sk}}
function updSk(){const d=dayNum();if(_sk.d===d)return getSk();_sk.c=_sk.d===d-1?_sk.c+1:1;_sk.b=Math.max(_sk.b,_sk.c);_sk.d=d;return getSk()}

function AnimVal({value,tp,cur,dur=300}){
  const[d,setD]=useState(value);const from=useRef(value);const t0=useRef(null);
  useEffect(()=>{from.current=d;t0.current=null;const go=ts=>{if(!t0.current)t0.current=ts;const p=Math.min((ts-t0.current)/dur,1);setD(from.current+(value-from.current)*(1-Math.pow(1-p,3)));if(p<1)requestAnimationFrame(go)};requestAnimationFrame(go)},[value]);
  return (<span>{fmtV(d,tp,cur)}</span>);
}

}

  );

function EstimateSlider({min,max,value,onChange,locked,answer,showAnswer,tp,cur,tolerance,C:T}){
  const ref=useRef(null);const dragging=useRef(false);const raf=useRef(null);const pv=useRef(value);
  const range=max-min||1;
  const pct=Math.max(0,Math.min(100,((value-min)/range)*100));
  const aPct=showAnswer?Math.max(0,Math.min(100,((answer-min)/range)*100)):null;
  const bullseyeHalf=answer*(tolerance*0.5/100);
  const bandLeft=showAnswer?Math.max(0,((answer-bullseyeHalf-min)/range)*100):0;
  const bandRight=showAnswer?Math.min(100,((answer+bullseyeHalf-min)/range)*100):0;
  const ease="cubic-bezier(0.22,1,0.36,1)";

  const commit=useCallback(()=>{if(raf.current){cancelAnimationFrame(raf.current);raf.current=null}onChange(pv.current)},[onChange]);
  const calc=useCallback(cx=>{if(locked||!ref.current)return;const rect=ref.current.getBoundingClientRect();pv.current=min+Math.max(0,Math.min(1,(cx-rect.left)/rect.width))*range;if(!raf.current)raf.current=requestAnimationFrame(()=>{raf.current=null;onChange(pv.current)})},[locked,min,range,onChange]);
  const onDown=useCallback(e=>{if(locked)return;e.preventDefault();dragging.current=true;calc(e.clientX);const mv=ev=>{if(dragging.current)calc(ev.clientX)};const up=()=>{dragging.current=false;commit();window.removeEventListener("pointermove",mv);window.removeEventListener("pointerup",up)};window.addEventListener("pointermove",mv,{passive:true});window.addEventListener("pointerup",up)},[locked,calc,commit]);

  const ticks=[0,0.25,0.5,0.75,1].map(f=>({v:min+range*f,p:f*100}));

  return (
    <div style={{padding:"28px 0 16px",opacity:locked?0.35:1,transition:"opacity 0.6s ease"}}>
      <div style={{position:"relative",height:30,marginBottom:4}}>
        <div style={{position:"absolute",left:`${pct}%`,transform:"translateX(-50%)",background:T.tooltipBg,color:T.tooltipText,padding:"5px 12px",borderRadius:8,fontSize:13,fontWeight:600,fontFamily:MONO,whiteSpace:"nowrap",boxShadow:"0 2px 8px rgba(0,0,0,0.15)",transition:locked?`left 0.7s ${ease}`:"none",opacity:value>min?1:0}}>{fmtV(value,tp,cur)}</div>
      </div>
      <div ref={ref} onPointerDown={onDown} style={{position:"relative",height:44,cursor:locked?"default":"grab",display:"flex",alignItems:"center",touchAction:"none",userSelect:"none"}}>
        <div style={{position:"absolute",left:0,right:0,height:4,borderRadius:2,background:T.track}}/>
        {showAnswer&&(<div style={{position:"absolute",left:`${bandLeft}%`,width:`${bandRight-bandLeft}%`,height:20,top:12,borderRadius:4,background:`${T.green}18`,border:`1px solid ${T.green}30`,transition:`all 0.6s ${ease}`,pointerEvents:"none"}}/>)}
        <div style={{position:"absolute",left:0,width:`${pct}%`,height:4,borderRadius:2,background:T.trackFill,transition:locked?`width 0.7s ${ease}`:"none",willChange:"width"}}/>
        {showAnswer&&aPct!=null&&(
          <div style={{position:"absolute",left:`${Math.max(3,Math.min(97,aPct))}%`,transform:"translateX(-50%)",transition:`left 0.7s ${ease}`,display:"flex",flexDirection:"column",alignItems:"center",zIndex:2,pointerEvents:"none",top:-8}}>
            <div style={{fontSize:9,color:T.accent,fontWeight:700,fontFamily:MONO,letterSpacing:1.5,marginBottom:3}}>ANSWER</div>
            <div style={{width:2,height:28,background:T.accent,borderRadius:1}}/>
          </div>
        )}
        <div style={{position:"absolute",left:`calc(${pct}% - 16px)`,width:32,height:32,borderRadius:"50%",background:T.surface,boxShadow:`0 1px 4px rgba(0,0,0,0.15), 0 0 0 2px ${T.accent}`,transition:locked?`left 0.7s ${ease}`:"none",willChange:"left",zIndex:4,pointerEvents:"none",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:T.accent}}/>
        </div>
      </div>
      <div style={{position:"relative",height:18,marginTop:4}}>
        {ticks.map((tk,i)=>(<span key={i} style={{position:"absolute",left:`${tk.p}%`,transform:"translateX(-50%)",fontSize:10,color:T.textQuat,fontFamily:MONO,fontWeight:500}}>{fmtT(tk.v,tp,cur)}</span>))}
      </div>
    </div>
  );
}

// ── Inline number input (first-class, always visible) ──────────
function NumberInput({value,onChange,locked,tp,cur,qr,C:T}){
  const inp=useRef(null);
  const[focused,setFocused]=useState(false);
  const[raw,setRaw]=useState("");

  // Sync display when value changes externally (slider drag)
  const lastExternal=useRef(value);
  useEffect(()=>{
    if(!focused&&value!==lastExternal.current){setRaw("");lastExternal.current=value}
  },[value,focused]);

  const displayVal=raw!==""?raw:(value>0?fmtN(tp==="price"&&cur==="USD"?value*EUR_USD:value):"0");

  const commit=()=>{
    let n=parseFloat(raw.replace(",","."));
    if(!isNaN(n)&&n>=0){
      if(tp==="price"&&cur==="USD")n/=EUR_USD;
      onChange(Math.max(qr[0],Math.min(qr[1],n)));
    }
    setRaw("");
  };

  const prefix=tp==="price"?(cur==="EUR"?"€":"$"):"";
  const suffix=tp==="pct"?"%":"";

  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:4,marginBottom:4}}>
      {prefix&&<span style={{fontSize:24,color:T.textTer,fontFamily:MONO,fontWeight:600}}>{prefix}</span>}
      <input
        ref={inp}
        type="text"
        inputMode="decimal"
        autoComplete="off"
        disabled={locked}
        value={focused?raw:displayVal}
        onFocus={()=>{setFocused(true);setRaw("")}}
        onBlur={()=>{setFocused(false);commit()}}
        onChange={e=>{const v=e.target.value.replace(/[^0-9.,]/g,"");setRaw(v)}}
        onKeyDown={e=>{if(e.key==="Enter"){commit();inp.current?.blur()}}}
        placeholder="0"
        style={{
          fontSize:32,fontWeight:700,color:locked?T.textTer:T.text,textAlign:"center",
          border:"none",outline:"none",fontFamily:MONO,
          width:Math.max(80,displayVal.length*20+20),maxWidth:200,
          background:focused?T.inputBg:"transparent",
          borderRadius:12,padding:"8px 12px",
          transition:"all 0.2s",
          boxShadow:focused?`0 0 0 2px ${T.accent}40`:"none",
          opacity:locked?0.4:1,
        }}
      />
      {suffix&&<span style={{fontSize:24,color:T.textTer,fontFamily:MONO,fontWeight:600}}>{suffix}</span>}
    </div>
  );
}

      {q.s&&<div style={{fontSize:11,color:T.textQuat,marginTop:8,fontFamily:FONT}}>{q.s}</div>}
      {q.f&&(<div style={{fontSize:13,color:T.textSec,marginTop:14,padding:"12px 16px",background:T.surface,borderRadius:10,lineHeight:1.6,fontFamily:FONT,fontStyle:"italic",borderLeft:`3px solid ${T.accent}30`}}>{q.f}</div>)}

function Countdown({C:T}){
  const[left,setLeft]=useState("");
  useEffect(()=>{
    const tick=()=>{
      const bru=new Date().toLocaleString("en-GB",{timeZone:"Europe/Brussels",hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
      const[hh,mm,ss]=bru.split(":").map(Number);
      const secLeft=(24*3600)-(hh*3600+mm*60+ss);
      const h=Math.floor(secLeft/3600);const m=Math.floor((secLeft%3600)/60);const s=secLeft%60;
      setLeft(`${h}h ${String(m).padStart(2,"0")}m ${String(s).padStart(2,"0")}s`);
    };
    tick();const id=setInterval(tick,1000);return()=>clearInterval(id);
  },[]);
  return (<div style={{fontSize:12,color:T.textTer,fontFamily:MONO,fontWeight:500,marginTop:8}}>Next puzzle in {left}</div>);
}

function StarCount({ss,C:T}){const tot=ss.reduce((a,s)=>a+s,0);if(!ss.length)return null;return (<span style={{display:"inline-flex",alignItems:"center",gap:5,background:T.goldBg,borderRadius:20,padding:"4px 12px",border:`1px solid ${T.gold}15`}}><svg width="13" height="13" viewBox="0 0 16 16"><path d="M8 1l2.2 4.4 4.8.7-3.5 3.4.8 4.9L8 12l-4.3 2.4.8-4.9L1 6.1l4.8-.7z" fill={T.gold}/></svg><span style={{fontSize:12,fontWeight:600,color:T.gold,fontFamily:MONO}}>{tot}</span></span>)}
function Btn({onClick,children,variant="primary",C:T}){const p=variant==="primary";return (<button onClick={onClick} style={{width:"100%",padding:"18px 24px",borderRadius:16,border:p?"none":`1.5px solid ${T.border}`,background:p?T.accent:T.surface,color:p?"#fff":T.text,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:FONT,letterSpacing:0.3,transition:"all 0.2s",marginTop:20,boxShadow:p?"0 4px 20px rgba(217,107,74,0.2), 0 1px 3px rgba(217,107,74,0.1)":"0 1px 3px rgba(0,0,0,0.04)"}}>{children}</button>)}
function TypeBadge({tp,C:T}){if(tp==="price")return null;const l=tp==="pct"?"Percentage":"Number";const c=tp==="pct"?T.gold:T.green;return (<span style={{fontSize:10,color:c,fontFamily:MONO,fontWeight:600,background:`${c}12`,padding:"3px 10px",borderRadius:6,letterSpacing:0.5}}>{l}</span>)}

// ═══ PRACTICE MODE ═════════════════════════════════════════════
function PracticeMode({cur,onExit,C:T}){
  const[idx,setIdx]=useState(0);const[g,setG]=useState(0);const[lk,setLk]=useState(false);const[showT,setShowT]=useState(false);const[revA,setRevA]=useState(false);const[filter,setFilter]=useState("all");
  const filtered=filter==="all"?BANK:BANK.filter(q=>q.tp===filter);const q=filtered[idx%filtered.length];
  useEffect(()=>{setG(q.r[0]);setLk(false);setShowT(false);setRevA(false)},[idx,filter]);
  const stars=calcScore(g,q.a,q.t,q.r);const ct=tier(stars);const off=Math.round(Math.abs(g-q.a)/Math.max(q.a,0.001)*100);
  const lock=()=>{setLk(true);setTimeout(()=>setRevA(true),300);setTimeout(()=>setShowT(true),700)};
  useEffect(()=>{const h=e=>{if(e.key==="Enter"&&!lk)lock()};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h)},[lk,g]);
  return (
    <div style={{animation:"fadeUp 0.3s ease",paddingTop:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{display:"flex",gap:4}}>{["all","price","pct","count"].map(f=>(<button key={f} onClick={()=>{setFilter(f);setIdx(0)}} style={{padding:"5px 12px",borderRadius:8,border:"none",cursor:"pointer",background:filter===f?T.accent:T.surfaceAlt,color:filter===f?"#fff":T.textTer,fontSize:11,fontWeight:600,fontFamily:MONO,transition:"all 0.15s"}}>{f==="all"?"All":f==="pct"?"%":f==="count"?"#":"€"}</button>))}</div>
        <button onClick={onExit} style={{background:"none",border:"none",color:T.textTer,fontSize:12,cursor:"pointer",fontFamily:FONT,fontWeight:600,textDecoration:"underline",textDecorationColor:T.textQuat}}>Exit</button>
      </div>
      <div style={{fontSize:11,color:T.textQuat,fontFamily:MONO,marginBottom:20}}>{(idx%filtered.length)+1}/{filtered.length} · tol:{q.t}%</div>
      <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:4}}><span style={{fontSize:28,lineHeight:1,marginTop:2,flexShrink:0}}>{q.i}</span><div><TypeBadge tp={q.tp} C={T}/><h2 style={{fontSize:21,fontWeight:600,lineHeight:1.5,margin:"4px 0 0",color:T.text,fontFamily:FONT}}>{q.q}</h2></div></div>
      <EstimateSlider min={q.r[0]} max={q.r[1]} value={g} onChange={v=>{if(!lk)setG(v)}} locked={lk} answer={q.a} showAnswer={revA} tp={q.tp} cur={cur} tolerance={q.t} C={T}/>
      <NumberInput value={g} onChange={v=>{if(!lk)setG(Math.max(q.r[0],Math.min(q.r[1],v)))}} locked={lk} tp={q.tp} cur={cur} qr={q.r} C={T}/>
      {revA&&<AnswerCard q={q} cur={cur} C={T}/>}
      <TierReveal tierData={ct} visible={showT} info={{off,bz:Math.round(q.t*0.5)}} isExact={off===0&&lk} C={T}/>
      {!lk&&<Btn onClick={lock} C={T}>Lock in</Btn>}
      {showT&&(<div style={{display:"flex",gap:10,marginTop:20}}><button onClick={()=>setIdx(i=>Math.max(0,i-1))} disabled={idx===0} style={{flex:1,padding:"16px",borderRadius:14,border:`1.5px solid ${T.border}`,background:T.surface,color:idx===0?T.textQuat:T.text,fontSize:14,fontWeight:600,cursor:idx===0?"default":"pointer",fontFamily:FONT}}>Previous</button><button onClick={()=>setIdx(i=>i+1)} style={{flex:1,padding:"16px",borderRadius:14,border:"none",background:T.accent,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>Next</button></div>)}
    </div>
  );
}

// ═══ SHARE CARD ════════════════════════════════════════════════
function MiniSlider({q,guess,score,exact,C:T}){
  const t=tier(score);const tc=T[t.c];
  const range=q.r[1]-q.r[0]||1;
  const gPct=Math.max(0,Math.min(100,((guess-q.r[0])/range)*100));
  const aPct=Math.max(0,Math.min(100,((q.a-q.r[0])/range)*100));
  const overlap=Math.abs(gPct-aPct)<3;
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,background:exact?`${T.gold}12`:T[t.bg],borderRadius:14,padding:"12px 14px",border:exact?`1px solid ${T.gold}30`:"1px solid transparent"}}>
      <span style={{fontSize:18,width:24,textAlign:"center",flexShrink:0}}>{q.i}</span>
      <div style={{flex:1,position:"relative",height:24,display:"flex",alignItems:"center"}}>
        {/* Track */}
        <div style={{position:"absolute",left:0,right:0,height:3,borderRadius:2,background:T.track}}/>
        {/* Gap line between guess and answer */}
        {!overlap&&<div style={{position:"absolute",left:`${Math.min(gPct,aPct)}%`,width:`${Math.abs(aPct-gPct)}%`,height:3,borderRadius:2,background:`${tc}40`}}/>}
        {/* Answer dot */}
        <div style={{position:"absolute",left:`${aPct}%`,transform:"translateX(-50%)",width:exact?12:10,height:exact?12:10,borderRadius:"50%",background:exact?T.gold:T.accent,boxShadow:exact?`0 0 6px ${T.gold}60`:"none",zIndex:2}}/>
        {/* Guess dot */}
        {!overlap&&<div style={{position:"absolute",left:`${gPct}%`,transform:"translateX(-50%)",width:8,height:8,borderRadius:"50%",background:T.surface,border:`2px solid ${tc}`,zIndex:1}}/>}
      </div>
      <span style={{fontSize:16,width:22,textAlign:"center",flexShrink:0}}>{exact?"💎":t.e}</span>
      <div style={{display:"flex",gap:2,flexShrink:0}}>{[...Array(5)].map((_,j)=>(<svg key={j} width="9" height="9" viewBox="0 0 16 16" style={{opacity:j<score?1:0.1}}><path d="M8 1l2.2 4.4 4.8.7-3.5 3.4.8 4.9L8 12l-4.3 2.4.8-4.9L1 6.1l4.8-.7z" fill={j<score?(exact?T.gold:tc):T.textQuat}/></svg>))}</div>
    </div>
  );
}

function ShareCard({ss,qs,sk,guesses,C:T}){
  const dn=dayNum();const tot=ss.reduce((a,s)=>a+s,0);
  const isExact=i=>Math.round(Math.abs((guesses[i]||0)-qs[i].a)/Math.max(qs[i].a,0.001)*100)===0;

  const qualifier=tot>=24?"Savant":tot>=20?"Expert":tot>=15?"Sharp":tot>=10?"Decent":tot>=5?"Rough":"Clueless";
  const txt=`Estimate #${dn} · ${qualifier} · ⭐ ${tot}/25${sk?.c>1?` · 🔥${sk.c}`:""}
estimate.io`;

  const[cp,setCp]=useState(false);const copy=()=>{navigator.clipboard.writeText(txt).then(()=>{setCp(true);setTimeout(()=>setCp(false),2500)})};

  // Also show qualifier in the card
  const qColor=tot>=20?T.green:tot>=15?T.gold:tot>=10?T.orange:T.red;
  return (
    <div style={{background:T.surface,borderRadius:24,padding:"36px 28px",marginTop:28,border:`1px solid ${T.borderLight}`,boxShadow:"0 4px 24px rgba(0,0,0,0.06)",animation:"fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) forwards"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:12,color:T.accent,letterSpacing:4,fontWeight:600,fontFamily:MONO}}>ESTIMATE #{dn}</div>
        <div style={{fontSize:56,fontWeight:800,color:T.text,marginTop:8,fontFamily:FONT,letterSpacing:-2}}>{tot}<span style={{fontSize:20,color:T.textQuat,fontWeight:500,letterSpacing:0}}> / 25</span></div>
        <div style={{fontSize:14,fontWeight:700,color:qColor,fontFamily:FONT,marginTop:6,letterSpacing:0.5}}>{qualifier}</div>
        <div style={{display:"flex",justifyContent:"center",gap:3,marginTop:12}}>{[...Array(25)].map((_,i)=>(<svg key={i} width="11" height="11" viewBox="0 0 16 16" style={{opacity:i<tot?1:0.1,transition:`opacity 0.3s ease ${i*0.03}s`}}><path d="M8 1l2.2 4.4 4.8.7-3.5 3.4.8 4.9L8 12l-4.3 2.4.8-4.9L1 6.1l4.8-.7z" fill={i<tot?T.gold:T.textQuat}/></svg>))}</div>
        {sk?.c>1&&<div style={{marginTop:16}}><StreakBadge sk={sk} C={T}/></div>}
        <Countdown C={T}/>
      </div>
      {/* Mini slider legend */}
      <div style={{display:"flex",justifyContent:"center",gap:16,marginBottom:14,fontSize:10,color:T.textTer,fontFamily:MONO}}>
        <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:T.surface,border:`2px solid ${T.textTer}`}}/> You</span>
        <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:T.accent}}/> Answer</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:32}}>
        {ss.map((s,i)=>(<MiniSlider key={i} q={qs[i]} guess={guesses[i]||0} score={s} exact={isExact(i)} C={T}/>))}
      </div>
      <button onClick={copy} style={{width:"100%",padding:"18px",borderRadius:16,border:"none",background:cp?T.green:T.accent,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:FONT,transition:"all 0.3s",letterSpacing:0.5,boxShadow:cp?"none":"0 4px 20px rgba(217,107,74,0.2)"}}>{cp?"Copied ✓":"Share result"}</button>
    </div>
  );
}

// ═══ MAIN ══════════════════════════════════════════════════════
function Estimate(){
  const qs=useRef(dailyQs()).current;
  const[dark,setDark]=useState(false);
  const T=dark?DARK:LIGHT;
  const[phase,setPhase]=useState("playing");
  const[rd,setRd]=useState(0);const[g,setG]=useState(0);
  const[lk,setLk]=useState(false);const[showT,setShowT]=useState(false);const[revA,setRevA]=useState(false);
  const[ss,setSs]=useState([]);const[guesses,setGuesses]=useState([]);
  const[sk,setSk]=useState(getSk());const[cur,setCur]=useState("EUR");
  const[showHelp,setShowHelp]=useState(false);

  const tapCount=useRef(0);const tapTimer=useRef(null);
  const handleDayTap=()=>{tapCount.current++;clearTimeout(tapTimer.current);tapTimer.current=setTimeout(()=>{tapCount.current=0},1500);if(tapCount.current>=5){tapCount.current=0;setPhase("practice")}};

  const q=qs[rd];
  useEffect(()=>{if(q)setG(q.r[0])},[rd]);

  const hG=v=>{if(!lk&&q)setG(Math.max(q.r[0],Math.min(q.r[1],v)))};
  const lock=useCallback(()=>{if(lk)return;setLk(true);setSs(p=>[...p,calcScore(g,q.a,q.t,q.r)]);setGuesses(p=>[...p,g]);setTimeout(()=>setRevA(true),400);setTimeout(()=>setShowT(true),1000)},[lk,g,q]);
  const next=()=>{if(rd>=4){setSk(updSk());setPhase("results")}else{setRd(r=>r+1);setLk(false);setShowT(false);setRevA(false)}};

  // Enter key to lock in
  useEffect(()=>{const h=e=>{if(e.key==="Enter"&&phase==="playing"&&!lk)lock()};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h)},[phase,lk,lock]);

  const cs=lk&&ss.length?ss[ss.length-1]:0;const ct=lk?tier(cs):null;
  const off=q&&g!=null?Math.round(Math.abs(g-q.a)/Math.max(q.a,0.001)*100):0;

  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:FONT,display:"flex",flexDirection:"column",alignItems:"center",padding:"0 20px",transition:"background 0.3s, color 0.3s"}}>
      <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Source+Code+Pro:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet"/>
      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
        @keyframes exactGlow{0%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
        @keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(120px) rotate(720deg);opacity:0}}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
        input[type=number]{-moz-appearance:textfield}
      `}</style>

      <div style={{textAlign:"center",padding:"32px 0 12px",width:"100%",maxWidth:460}}>
        <h1 style={{fontSize:28,fontWeight:800,margin:0,color:T.text,fontFamily:FONT,letterSpacing:-0.5,textTransform:"uppercase"}}>Estimate</h1>
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:10,marginTop:10,flexWrap:"wrap"}}>
          <span onClick={handleDayTap} style={{fontSize:11,color:T.textQuat,fontFamily:MONO,fontWeight:600,cursor:"default",userSelect:"none",letterSpacing:1}}>#{dayNum()}</span>
          <StreakBadge sk={sk} C={T}/><StarCount ss={ss} C={T}/>
          {(phase==="playing"||phase==="practice")&&<CurrencySwitch cur={cur} set={setCur} C={T}/>}
        </div>

        {phase==="playing"&&(
          <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:16}}>
            {[0,1,2,3,4].map(i=>{const done=i<ss.length;const t=done?tier(ss[i]):null;return (<div key={i} style={{width:48,height:4,borderRadius:2,background:done?T[t.c]:i===rd?T.accent:T.track,transition:"all 0.5s cubic-bezier(0.22,1,0.36,1)"}}/>)})}
          </div>
        )}
      </div>

      <div style={{width:"100%",maxWidth:460,flex:1,paddingBottom:48}}>
        {phase==="practice"&&<PracticeMode cur={cur} onExit={()=>setPhase("playing")} C={T}/>}

        {phase==="playing"&&q&&(
          <div style={{marginTop:28,animation:"fadeUp 0.4s cubic-bezier(0.22,1,0.36,1)"}} key={rd}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{fontSize:12,color:T.textQuat,fontFamily:MONO,fontWeight:600,letterSpacing:1}}>{rd+1} of 5</span>
              <TypeBadge tp={q.tp} C={T}/>
            </div>
            <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:4}}>
              <span style={{fontSize:28,lineHeight:1,marginTop:2,flexShrink:0}}>{q.i}</span>
              <h2 style={{fontSize:23,fontWeight:600,lineHeight:1.45,margin:0,color:T.text,fontFamily:FONT,letterSpacing:-0.3}}>{q.q}</h2>
            </div>
            <EstimateSlider min={q.r[0]} max={q.r[1]} value={g??0} onChange={hG} locked={lk} answer={q.a} showAnswer={revA} tp={q.tp} cur={cur} tolerance={q.t} C={T}/>
            <NumberInput value={g??0} onChange={hG} locked={lk} tp={q.tp} cur={cur} qr={q.r} C={T}/>
            {revA&&<AnswerCard q={q} cur={cur} C={T}/>}
            <TierReveal tierData={ct} visible={showT} info={{off,bz:Math.round(q.t*0.5)}} isExact={off===0&&lk} C={T}/>
            {!lk&&<Btn onClick={lock} C={T}>Lock in</Btn>}
            {showT&&<Btn onClick={next} variant="secondary" C={T}>{rd>=4?"See results":"Next question →"}</Btn>}
          </div>
        )}

        {phase==="results"&&<ShareCard ss={ss} qs={qs} sk={sk} guesses={guesses} C={T}/>}
      </div>

      {/* Footer controls */}
      <div style={{width:"100%",maxWidth:460,padding:"16px 0 24px",display:"flex",justifyContent:"center",alignItems:"center",gap:12}}>
        <button onClick={()=>setShowHelp(h=>!h)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:T.textQuat,fontFamily:FONT,fontWeight:500,textDecoration:"underline",textDecorationColor:T.textQuat+"60",textUnderlineOffset:3,padding:"4px 8px"}}>How to play</button>
        <span style={{color:T.textQuat,fontSize:10}}>·</span>
        <ThemeToggle dark={dark} set={setDark} C={T}/>
      </div>

      {showHelp&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeUp 0.2s ease"}} onClick={()=>setShowHelp(false)}>
          <div style={{background:T.surface,borderRadius:20,padding:"28px 24px",maxWidth:400,width:"100%",boxShadow:"0 8px 32px rgba(0,0,0,0.15)"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:18,fontWeight:700,color:T.text,fontFamily:FONT,marginBottom:16}}>How to play</div>
            <div style={{fontSize:14,color:T.textSec,lineHeight:1.7,fontFamily:FONT}}><strong style={{color:T.text}}>5 daily questions.</strong> Slide or type to estimate prices, percentages, and counts. Press <strong style={{color:T.text}}>Enter</strong> or tap Lock in. Well-known facts demand precision. Obscure ones give more room.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:16}}>{TIERS.map((t,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:T[t.bg],borderRadius:8,fontSize:12,color:T[t.c],fontFamily:FONT,fontWeight:600}}>{t.e} {t.l}</div>))}</div>
            <button onClick={()=>setShowHelp(false)} style={{width:"100%",marginTop:20,padding:"14px",borderRadius:12,border:"none",background:T.surfaceAlt,color:T.text,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>Got it</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Estimate));
</script>
</body>
</html>
